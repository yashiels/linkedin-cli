# PR-Agent Configuration
# See https://qodo-merge-docs.qodo.ai/tools/

[config]
response_language = "en-US"
output_relevant_configurations = false
verbosity_level = 0

[pr_reviewer]
num_max_findings = 5
require_score_review = true
require_tests_review = true
require_estimate_effort_to_review = true
require_can_be_split_review = true
require_security_review = true
require_todo_scan = true
inline_code_comments = true
persistent_comment = true
enable_review_labels_security = true
enable_review_labels_effort = true
extra_instructions = """\
Focus on bugs, security issues, performance problems, and logic errors.
Be concise. Skip trivial style nits unless they affect readability.
Flag any hardcoded secrets, API keys, or credentials.
Check for proper error handling and edge cases.
"""

[pr_description]
publish_labels = true
add_original_user_description = true
generate_ai_title = false
enable_pr_diagram = true
enable_semantic_files_types = true
enable_large_pr_handling = true
final_update_message = true

[pr_code_suggestions]
num_code_suggestions_per_chunk = 4
commitable_code_suggestions = true
dual_publishing_score_threshold = 7
focus_only_on_problems = true
demand_code_suggestions_self_review = true
persistent_comment = true
suggestions_score_threshold = 0
auto_extended_mode = true

[pr_questions]
use_conversation_history = true

[best_practices]
enable_global_best_practices = true

[auto_best_practices]
enable_auto_best_practices = true
utilize_auto_best_practices = true
max_patterns = 5

[github_app]
pr_commands = [
    "/describe --pr_description.final_update_message=false",
    "/review",
    "/improve",
]
handle_push_trigger = true
push_trigger_ignore_bot_commits = true
push_trigger_ignore_merge_commits = true
push_trigger_wait_for_initial_review = true
push_trigger_pending_tasks_backlog = true
push_trigger_pending_tasks_ttl = 300
push_commands = [
    "/describe",
    "/review",
]
